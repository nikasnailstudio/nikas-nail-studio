<!DOCTYPE html>
<html>
<head>
  <title>Nika’s Nail Studio</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Poppins;
      background: #f6f3ef;
      color: #2b2b2b;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 80px;
      flex-wrap: wrap;
    }

    .text {
      max-width: 500px;
    }

    h1 {
      font-family: "Playfair Display";
      font-size: 48px;
      margin: 20px 0;
    }

    p {
      color: #666;
    }

    .buttons {
      margin-top: 20px;
    }

    button {
      padding: 12px 24px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      margin-right: 10px;
    }

    .primary {
      background: #6d5c3d;
      color: white;
    }

    .secondary {
      background: transparent;
      border: 1px solid #6d5c3d;
    }

    .image-box img {
      width: 300px;
      border-radius: 20px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 60px;
      background: #f6f3ef;
    }

    .nav a {
      text-decoration: none;
      margin: 0 10px;
      color: #333;
    }

    .book-btn {
      background: #6d5c3d;
      color: white;
      padding: 8px 18px;
      border-radius: 20px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <strong>Nika’s Nail Studio</strong>

  <div>
    <a href="#">Services</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
    <a href="https://calendly.com/candilladanika/nailappointment" class="book-btn">Book Now</a>
  </div>
</div>

<!-- HERO SECTION -->
<div class="container">

  <div class="text">
    <p>PRIVATE NAIL ARTIST</p>

    <h1>Artistry at your fingertips.</h1>

    <p>
      A one-woman nail studio. Every appointment is clean,
      detailed, and styled to match your aesthetic.
    </p>

    <div class="buttons">
      <a href="https://calendly.com/candilladanika/nailappointment">
        <button class="primary">Reserve a Slot</button>
      </a>

      <button class="secondary">View Services</button>
    </div>
  </div>

  <div class="image-box">
    <!-- REPLACE WITH YOUR REAL IMAGE -->
    <img src="https://github.com/nikasnailstudio/nikas-nail-studio/blob/main/NIKA.webp">
  </div>

</div>

</body>
</html>
